name: 'Update CloudFront Response Headers'
description: 'Creates or updates the CloudFront response headers policy: X-Version plus baseline security headers (nosniff, frame-options, referrer-policy, HSTS)'

inputs:
  version:
    description: 'Version to set in X-Version header'
    required: true
  distribution-id:
    description: 'CloudFront distribution ID'
    required: true
  policy-name:
    description: 'Name of the response headers policy'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Update CloudFront response headers policy
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        DIST_ID="${{ inputs.distribution-id }}"
        POLICY_NAME="${{ inputs.policy-name }}"
        POLICY_ID=""

        # Check if policy exists.
        #
        # The name is NOT at Items[].Name. A list item is
        #   { Type, ResponseHeadersPolicy: { Id, ResponseHeadersPolicyConfig: { Name } } }
        # so a query on Items[?Name==...] silently matches nothing. That made this
        # step conclude the policy did not exist, try to create it, and fail with
        # ResponseHeadersPolicyAlreadyExists on every deploy since it was written.
        # Being continue-on-error, it failed quietly — so the policy was never
        # attached and the site served no X-Version header at all.
        set +e
        EXISTING_POLICY=$(aws cloudfront list-response-headers-policies \
          --type custom \
          --query "ResponseHeadersPolicyList.Items[?ResponseHeadersPolicy.ResponseHeadersPolicyConfig.Name=='$POLICY_NAME'].ResponseHeadersPolicy.Id" \
          --output text 2>&1)
        LIST_EXIT_CODE=$?
        set -e

        if [ $LIST_EXIT_CODE -ne 0 ]; then
          echo "⚠ Failed to list policies (missing permissions)"
          echo "Required IAM permissions: cloudfront:ListResponseHeadersPolicies"
          echo "Skipping CloudFront header update. Deployment will continue."
          exit 0
        fi

        # Extract policy ID if found (remove any error messages)
        EXISTING_POLICY=$(echo "$EXISTING_POLICY" | grep -E '^[a-zA-Z0-9-]+$' || echo "")

        # Create or update policy
        if [ -z "$EXISTING_POLICY" ]; then
          echo "Creating response headers policy..."
          set +e
          POLICY_OUTPUT=$(aws cloudfront create-response-headers-policy \
            --response-headers-policy-config "{
              \"Name\": \"$POLICY_NAME\",
              \"CustomHeadersConfig\": {
                \"Items\": [{
                  \"Header\": \"X-Version\",
                  \"Value\": \"$VERSION\",
                  \"Override\": true
                }],
                \"Quantity\": 1
              },
              \"SecurityHeadersConfig\": {
                \"ContentTypeOptions\": { \"Override\": true },
                \"FrameOptions\": { \"FrameOption\": \"SAMEORIGIN\", \"Override\": true },
                \"ReferrerPolicy\": { \"ReferrerPolicy\": \"strict-origin-when-cross-origin\", \"Override\": true },
                \"StrictTransportSecurity\": { \"AccessControlMaxAgeSec\": 63072000, \"IncludeSubdomains\": true, \"Preload\": false, \"Override\": true }
              }
            }" \
            --query 'ResponseHeadersPolicy.Id' \
            --output text 2>&1)
          CREATE_EXIT_CODE=$?
          set -e

          if [ $CREATE_EXIT_CODE -ne 0 ]; then
            # Check if policy already exists (race condition or created outside script)
            if echo "$POLICY_OUTPUT" | grep -q "ResponseHeadersPolicyAlreadyExists"; then
              echo "Policy already exists, finding it..."
              set +e
              EXISTING_POLICY=$(aws cloudfront list-response-headers-policies \
                --type custom \
          --query "ResponseHeadersPolicyList.Items[?ResponseHeadersPolicy.ResponseHeadersPolicyConfig.Name=='$POLICY_NAME'].ResponseHeadersPolicy.Id" \
                --output text 2>&1)
              LIST_EXIT_CODE=$?
              set -e

              if [ $LIST_EXIT_CODE -eq 0 ]; then
                EXISTING_POLICY=$(echo "$EXISTING_POLICY" | grep -E '^[a-zA-Z0-9-]+$' || echo "")
                if [ -n "$EXISTING_POLICY" ]; then
                  echo "Found existing policy: $EXISTING_POLICY, will update it"
                  # Fall through to update logic below
                else
                  echo "⚠ Policy exists but could not retrieve ID"
                  echo "Error: $POLICY_OUTPUT"
                  echo "Skipping CloudFront header update. Deployment will continue."
                  exit 0
                fi
              else
                echo "⚠ Failed to list policies after create error"
                echo "Error: $POLICY_OUTPUT"
                echo "Skipping CloudFront header update. Deployment will continue."
                exit 0
              fi
            else
              echo "⚠ Failed to create policy (missing permissions)"
              echo "Error: $POLICY_OUTPUT"
              echo "Required IAM permissions: cloudfront:CreateResponseHeadersPolicy"
              echo "Skipping CloudFront header update. Deployment will continue."
              exit 0
            fi
          else
            POLICY_ID="$POLICY_OUTPUT"
            echo "✓ Created policy: $POLICY_ID"
          fi
        fi

        # Update existing policy if we found one or if create failed due to existing policy
        if [ -z "$POLICY_ID" ]; then
          # We need to update an existing policy
          if [ -z "$EXISTING_POLICY" ]; then
            # Re-fetch if we don't have it yet
            set +e
            EXISTING_POLICY=$(aws cloudfront list-response-headers-policies \
              --type custom \
          --query "ResponseHeadersPolicyList.Items[?ResponseHeadersPolicy.ResponseHeadersPolicyConfig.Name=='$POLICY_NAME'].ResponseHeadersPolicy.Id" \
              --output text 2>&1)
            LIST_EXIT_CODE=$?
            set -e

            if [ $LIST_EXIT_CODE -eq 0 ]; then
              EXISTING_POLICY=$(echo "$EXISTING_POLICY" | grep -E '^[a-zA-Z0-9-]+$' || echo "")
            fi
          fi

          if [ -n "$EXISTING_POLICY" ]; then
            echo "Updating existing policy: $EXISTING_POLICY"
            set +e
            POLICY_ETAG_OUTPUT=$(aws cloudfront get-response-headers-policy \
              --id "$EXISTING_POLICY" \
              --query 'ETag' \
              --output text 2>&1)
            GET_EXIT_CODE=$?
            set -e

            if [ $GET_EXIT_CODE -ne 0 ]; then
              echo "⚠ Failed to read policy (missing permissions)"
              echo "Error: $POLICY_ETAG_OUTPUT"
              echo "Required IAM permissions: cloudfront:GetResponseHeadersPolicy"
              echo "Skipping CloudFront header update. Deployment will continue."
              exit 0
            fi

            POLICY_ETAG="$POLICY_ETAG_OUTPUT"

            set +e
            UPDATE_OUTPUT=$(aws cloudfront update-response-headers-policy \
              --id "$EXISTING_POLICY" \
              --if-match "$POLICY_ETAG" \
              --response-headers-policy-config "{
                \"Name\": \"$POLICY_NAME\",
                \"CustomHeadersConfig\": {
                  \"Items\": [{
                    \"Header\": \"X-Version\",
                    \"Value\": \"$VERSION\",
                    \"Override\": true
                  }],
                  \"Quantity\": 1
                },
                \"SecurityHeadersConfig\": {
                  \"ContentTypeOptions\": { \"Override\": true },
                  \"FrameOptions\": { \"FrameOption\": \"SAMEORIGIN\", \"Override\": true },
                  \"ReferrerPolicy\": { \"ReferrerPolicy\": \"strict-origin-when-cross-origin\", \"Override\": true },
                  \"StrictTransportSecurity\": { \"AccessControlMaxAgeSec\": 63072000, \"IncludeSubdomains\": true, \"Preload\": false, \"Override\": true }
                }
              }" 2>&1)
            UPDATE_EXIT_CODE=$?
            set -e

            if [ $UPDATE_EXIT_CODE -ne 0 ]; then
              echo "⚠ Failed to update policy (missing permissions)"
              echo "Error: $UPDATE_OUTPUT"
              echo "Required IAM permissions: cloudfront:UpdateResponseHeadersPolicy"
              echo "Skipping CloudFront header update. Deployment will continue."
              exit 0
            fi

            POLICY_ID="$EXISTING_POLICY"
            echo "✓ Updated policy: $POLICY_ID"
          else
            echo "⚠ Could not find existing policy to update"
            echo "Skipping CloudFront header update. Deployment will continue."
            exit 0
          fi
        fi

        # Attach policy to distribution
        echo "Attaching policy to distribution..."
        set +e
        DIST_CONFIG=$(aws cloudfront get-distribution-config --id "$DIST_ID" 2>&1)
        GET_DIST_EXIT_CODE=$?
        set -e

        if [ $GET_DIST_EXIT_CODE -ne 0 ]; then
          echo "⚠ Failed to read distribution config (missing permissions)"
          echo "Error: $DIST_CONFIG"
          echo "Required IAM permissions: cloudfront:GetDistribution"
          echo "Skipping CloudFront header update. Deployment will continue."
          exit 0
        fi

        ETAG=$(echo "$DIST_CONFIG" | jq -r '.ETag')
        CURRENT_POLICY=$(echo "$DIST_CONFIG" | jq -r '.DistributionConfig.DefaultCacheBehavior.ResponseHeadersPolicyId // empty')

        if [ "$CURRENT_POLICY" != "$POLICY_ID" ]; then
          # get-distribution-config returns { ETag, DistributionConfig }, but
          # --distribution-config wants ONLY the inner object. Passing the whole
          # response made the CLI reject it with
          #   ParamValidation: Unknown parameter "ETag" / Missing "CallerReference"
          # which the handler below then misreported as a permissions problem.
          UPDATED_CONFIG=$(echo "$DIST_CONFIG" | jq --arg policy_id "$POLICY_ID" \
            '.DistributionConfig | .DefaultCacheBehavior.ResponseHeadersPolicyId = $policy_id')

          set +e
          UPDATE_DIST_OUTPUT=$(aws cloudfront update-distribution \
            --id "$DIST_ID" \
            --if-match "$ETAG" \
            --distribution-config "$UPDATED_CONFIG" 2>&1)
          UPDATE_DIST_EXIT_CODE=$?
          set -e

          if [ $UPDATE_DIST_EXIT_CODE -ne 0 ]; then
            echo "⚠ Failed to attach policy to distribution"
            echo "Error: $UPDATE_DIST_OUTPUT"
            echo "If this is AccessDenied, the deploy user needs cloudfront:UpdateDistribution."
            echo "Policy created/updated but not attached. Attach manually in AWS Console."
            exit 0
          fi

          echo "✓ Policy attached to distribution"
        else
          echo "✓ Policy already attached"
        fi

        echo "✓ X-Version header will be: $VERSION"
