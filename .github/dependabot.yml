version: 2
updates:
  # App dependencies (package.json + pnpm-lock.yaml).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # One PR for the routine dev-tooling churn instead of a dozen.
      dev-dependencies:
        dependency-type: "development"
  # The Actions pinned in .github/workflows and .github/actions.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
